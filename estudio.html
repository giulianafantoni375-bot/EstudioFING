<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstudioFING — Estudio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav id="sidebar"></nav>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title">Estudio</div>
        <div class="topbar-sub">Flashcards, quizzes e infografías por materia</div>
      </div>
      <div class="topbar-right">
        <span class="date-badge" id="current-date"></span>
      </div>
    </header>

    <div class="content">
      <div class="estudio-layout">

        <!-- Panel lateral -->
        <aside class="estudio-sidebar">
          <div class="estudio-sidebar-section">Materias</div>
          <div id="estudio-nav-materias"></div>

          <div style="height:1px;background:var(--border);margin:8px 0"></div>
          <div class="estudio-sidebar-section">Herramienta</div>
          <div id="estudio-nav-modos"></div>
        </aside>

        <!-- Panel principal -->
        <section id="estudio-panel">
          <div class="empty-state">
            <div class="empty-state-icon">👆</div>
            <div class="empty-state-title">Seleccioná una materia</div>
            <div class="empty-state-text">Elegí una materia y una herramienta de estudio del panel izquierdo.</div>
          </div>
        </section>

      </div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    renderSidebar('estudio');
    document.getElementById('current-date').textContent =
      new Date().toLocaleDateString('es-UY', { day:'2-digit', month:'short', year:'numeric' });

    let activeMateriaId = null;
    let activeModo      = 'flashcards';

    // Leer URL params
    const urlParam = new URLSearchParams(window.location.search).get('materia');

    // ── Nav materias ─────────────────────────────────────────
    const navMaterias = document.getElementById('estudio-nav-materias');
    DATA.materias.forEach(m => {
      const item = document.createElement('div');
      item.className = 'estudio-nav-item';
      item.dataset.materia = m.id;
      item.innerHTML = `
        <span class="nav-dot" style="background:${m.color}"></span>
        ${m.abrev}
      `;
      item.addEventListener('click', () => setMateria(m.id));
      navMaterias.appendChild(item);
    });

    // ── Nav modos ────────────────────────────────────────────
    const modos = [
      { id: 'flashcards',  label: '🃏 Flashcards' },
      { id: 'quiz',        label: '✅ Quiz' },
      { id: 'infografias', label: '🗂 Infografías' },
    ];

    const navModos = document.getElementById('estudio-nav-modos');
    modos.forEach(mo => {
      const item = document.createElement('div');
      item.className = 'estudio-nav-item';
      item.dataset.modo = mo.id;
      item.innerHTML = mo.label;
      item.addEventListener('click', () => setModo(mo.id));
      navModos.appendChild(item);
    });

    function setMateria(id) {
      activeMateriaId = id;
      navMaterias.querySelectorAll('.estudio-nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.materia === id);
      });
      renderPanel();
    }

    function setModo(id) {
      activeModo = id;
      navModos.querySelectorAll('.estudio-nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.modo === id);
      });
      renderPanel();
    }

    // Activar el modo por defecto visualmente
    navModos.querySelector('[data-modo="flashcards"]').classList.add('active');

    // ── Render panel principal ───────────────────────────────
    function renderPanel() {
      if (!activeMateriaId) return;
      const m = DATA.materias.find(m => m.id === activeMateriaId);
      if (!m) return;

      if (activeModo === 'flashcards') renderFlashcards(m);
      else if (activeModo === 'quiz')  renderQuiz(m);
      else if (activeModo === 'infografias') renderInfografias(m);
    }

    // ============================================================
    // FLASHCARDS
    // ============================================================
    let fcIndex = 0;
    let fcFlipped = false;

    function renderFlashcards(m) {
      const cards = m.flashcards || [];
      const panel = document.getElementById('estudio-panel');

      if (!cards.length) {
        panel.innerHTML = emptyState('🃏', 'Sin flashcards', `Agregá flashcards a la materia "${m.abrev}" en data.js`);
        return;
      }

      fcIndex   = 0;
      fcFlipped = false;
      const state = getFlashcardState();

      const known   = cards.filter((_, i) => state[`${m.id}_${i}`] === 'known').length;
      const unknown = cards.filter((_, i) => state[`${m.id}_${i}`] === 'unknown').length;

      panel.innerHTML = `
        <div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:15px;font-weight:700">${m.abrev} — Flashcards</div>
          <button class="btn btn-outline btn-sm" id="fc-reset">Reiniciar progreso</button>
        </div>

        <div class="flashcard-container">
          <div class="flashcard-meta" id="fc-meta"></div>

          <div class="flashcard-wrap" id="flashcard" onclick="fcToggleFlip()">
            <div class="flashcard-inner" id="fc-inner">
              <div class="flashcard-face flashcard-front">
                <div class="flashcard-label">Pregunta</div>
                <div class="flashcard-text" id="fc-pregunta"></div>
                <div class="flashcard-hint">Hacé clic para ver la respuesta</div>
              </div>
              <div class="flashcard-face flashcard-back">
                <div class="flashcard-label">Respuesta</div>
                <div class="flashcard-text" id="fc-respuesta"></div>
              </div>
            </div>
          </div>

          <div class="flashcard-actions">
            <button class="btn btn-outline" id="fc-prev">← Anterior</button>
            <button class="btn btn-unknown" id="fc-no" onclick="fcMark('unknown')">✕ No la sabía</button>
            <button class="btn btn-known"   id="fc-si" onclick="fcMark('known')">✓ La sabía</button>
            <button class="btn btn-outline" id="fc-next">Siguiente →</button>
          </div>

          <div class="flashcard-progress-row">
            <span class="fc-known">✓ Sabidas: <b id="fc-known-count">${known}</b></span>
            <span>·</span>
            <span class="fc-unknown">✕ Por repasar: <b id="fc-unknown-count">${unknown}</b></span>
            <span>·</span>
            <span style="color:var(--text-muted)">Sin marcar: <b id="fc-pending-count">${cards.length - known - unknown}</b></span>
          </div>
        </div>
      `;

      document.getElementById('fc-prev').addEventListener('click', () => fcNav(-1, m));
      document.getElementById('fc-next').addEventListener('click', () => fcNav(1, m));
      document.getElementById('fc-reset').addEventListener('click', () => fcReset(m));

      fcUpdateCard(m);
    }

    function fcUpdateCard(m) {
      const cards = m.flashcards || [];
      const card  = cards[fcIndex];
      const state = getFlashcardState();
      const key   = `${m.id}_${fcIndex}`;
      const marca = state[key];

      const wrap = document.getElementById('flashcard');
      if (wrap) wrap.classList.remove('flipped');
      fcFlipped = false;

      document.getElementById('fc-pregunta').textContent  = card.pregunta;
      document.getElementById('fc-respuesta').textContent = card.respuesta;

      document.getElementById('fc-meta').innerHTML = `
        <span class="flashcard-counter">${fcIndex + 1} / ${cards.length}</span>
        <div style="display:flex;gap:8px;align-items:center">
          ${nivelBadge(card.nivel)}
          ${marca === 'known'   ? '<span class="badge" style="background:#dcfce7;color:#166534">✓ Sabida</span>'  : ''}
          ${marca === 'unknown' ? '<span class="badge" style="background:#fee2e2;color:#991b1b">✕ Repasar</span>' : ''}
        </div>
      `;
    }

    function fcToggleFlip() {
      fcFlipped = !fcFlipped;
      const wrap = document.getElementById('flashcard');
      if (wrap) wrap.classList.toggle('flipped', fcFlipped);
    }

    function fcNav(dir, m) {
      const cards = m.flashcards || [];
      fcIndex = (fcIndex + dir + cards.length) % cards.length;
      fcUpdateCard(m);
    }

    function fcMark(valor) {
      if (!activeMateriaId) return;
      const m = DATA.materias.find(m => m.id === activeMateriaId);
      setFlashcardState(`${m.id}_${fcIndex}`, valor);

      const cards = m.flashcards || [];
      const state = getFlashcardState();
      const known   = cards.filter((_, i) => state[`${m.id}_${i}`] === 'known').length;
      const unknown = cards.filter((_, i) => state[`${m.id}_${i}`] === 'unknown').length;

      document.getElementById('fc-known-count').textContent   = known;
      document.getElementById('fc-unknown-count').textContent = unknown;
      document.getElementById('fc-pending-count').textContent = cards.length - known - unknown;

      fcNav(1, m);
    }

    function fcReset(m) {
      const cards = m.flashcards || [];
      const state = getFlashcardState();
      cards.forEach((_, i) => { delete state[`${m.id}_${i}`]; });
      localStorage.setItem('flashcards_state', JSON.stringify(state));
      renderFlashcards(m);
    }

    // ============================================================
    // QUIZ
    // ============================================================
    let quizAnswers    = {};
    let quizSubmitted  = false;
    let activeQuizIdx  = 0;

    function renderQuiz(m) {
      const cuestionarios = m.cuestionarios || [];
      const panel = document.getElementById('estudio-panel');

      if (!cuestionarios.length) {
        panel.innerHTML = emptyState('✅', 'Sin quizzes', `Agregá cuestionarios a "${m.abrev}" en data.js`);
        return;
      }

      quizAnswers   = {};
      quizSubmitted = false;
      activeQuizIdx = 0;

      const quiz   = cuestionarios[activeQuizIdx];
      const scores = getQuizScores();
      const scoreKey = `${m.id}_${activeQuizIdx}`;
      const prevScore = scores[scoreKey];

      panel.innerHTML = `
        <div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div style="font-size:15px;font-weight:700">${m.abrev} — Quiz</div>
          ${cuestionarios.length > 1 ? `
            <select class="form-select" id="quiz-selector">
              ${cuestionarios.map((q,i) => `<option value="${i}">${q.titulo}</option>`).join('')}
            </select>` : ''}
        </div>
        ${prevScore ? `<div style="margin-bottom:12px;padding:10px 14px;background:#f0fdf4;border:1px solid #86efac;border-radius:var(--radius-sm);font-size:13px;color:#166534">
          Último intento: <b>${prevScore.score}/${prevScore.total}</b> · ${prevScore.fecha}
        </div>` : ''}
        <div class="quiz-wrap" id="quiz-content"></div>
      `;

      if (cuestionarios.length > 1) {
        document.getElementById('quiz-selector').addEventListener('change', function() {
          activeQuizIdx = parseInt(this.value);
          quizAnswers   = {};
          quizSubmitted = false;
          renderQuizContent(m);
        });
      }

      renderQuizContent(m);
    }

    function renderQuizContent(m) {
      const quiz  = m.cuestionarios[activeQuizIdx];
      const cont  = document.getElementById('quiz-content');
      const letters = ['A', 'B', 'C', 'D', 'E'];

      cont.innerHTML = `
        <div class="quiz-header">
          <div class="quiz-titulo">${quiz.titulo}</div>
          <div class="quiz-subinfo">${quiz.preguntas.length} pregunta${quiz.preguntas.length !== 1 ? 's' : ''}</div>
        </div>

        ${quiz.preguntas.map((p, pi) => `
          <div class="quiz-pregunta-card" id="qcard-${pi}">
            <div class="quiz-pregunta-num">Pregunta ${pi + 1}</div>
            <div class="quiz-pregunta-text">${p.enunciado}</div>
            <div class="quiz-opciones" id="qopts-${pi}">
              ${p.opciones.map((op, oi) => `
                <div class="quiz-opcion" data-q="${pi}" data-o="${oi}" onclick="quizSelect(${pi}, ${oi})">
                  <span class="quiz-opcion-letter">${letters[oi]}</span>
                  <span>${op}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}

        <div class="quiz-nav">
          <div id="quiz-status" style="font-size:13px;color:var(--text-muted)">
            Respondidas: <b>0 / ${quiz.preguntas.length}</b>
          </div>
          <button class="btn btn-primary" id="quiz-submit" onclick="quizSubmit('${m.id}')">
            Enviar respuestas
          </button>
        </div>
      `;
    }

    function quizSelect(qi, oi) {
      if (quizSubmitted) return;
      quizAnswers[qi] = oi;

      const m    = DATA.materias.find(m => m.id === activeMateriaId);
      const quiz = m.cuestionarios[activeQuizIdx];

      // Actualizar UI
      const opts = document.querySelectorAll(`[data-q="${qi}"]`);
      opts.forEach(opt => {
        opt.classList.toggle('selected', parseInt(opt.dataset.o) === oi);
      });

      const count = Object.keys(quizAnswers).length;
      const status = document.getElementById('quiz-status');
      if (status) status.innerHTML = `Respondidas: <b>${count} / ${quiz.preguntas.length}</b>`;
    }

    function quizSubmit(materiaId) {
      const m    = DATA.materias.find(m => m.id === materiaId);
      const quiz = m.cuestionarios[activeQuizIdx];

      if (Object.keys(quizAnswers).length < quiz.preguntas.length) {
        const faltantes = quiz.preguntas.length - Object.keys(quizAnswers).length;
        if (!confirm(`Faltan ${faltantes} pregunta${faltantes > 1 ? 's' : ''} por responder. ¿Enviar igual?`)) return;
      }

      quizSubmitted = true;
      let score = 0;

      quiz.preguntas.forEach((p, pi) => {
        const selected = quizAnswers[pi];
        const correcta = p.correcta;
        const opts     = document.querySelectorAll(`[data-q="${pi}"]`);

        opts.forEach(opt => {
          opt.classList.add('disabled');
          const oi = parseInt(opt.dataset.o);
          if (oi === correcta) opt.classList.add('correct');
          else if (oi === selected && selected !== correcta) opt.classList.add('wrong');
        });

        if (selected === correcta) score++;

        // Mostrar explicación
        const card = document.getElementById('qcard-' + pi);
        if (card && p.explicacion) {
          const expl = document.createElement('div');
          expl.className = 'quiz-explicacion';
          expl.textContent = '💡 ' + p.explicacion;
          card.appendChild(expl);
        }
      });

      setQuizScore(`${materiaId}_${activeQuizIdx}`, score, quiz.preguntas.length);

      // Mostrar resultado
      const nav = document.querySelector('.quiz-nav');
      if (nav) {
        const pct = Math.round(score / quiz.preguntas.length * 100);
        const color = pct >= 80 ? '#22c55e' : pct >= 60 ? '#f59e0b' : '#ef4444';
        const msg   = pct >= 80 ? '¡Excelente!' : pct >= 60 ? 'Bien, a seguir repasando' : 'Hay que repasar más';
        nav.innerHTML = `
          <div style="display:flex;align-items:center;gap:16px;width:100%">
            <div style="background:${color}20;border:2px solid ${color};border-radius:50%;width:64px;height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
              <span style="font-size:18px;font-weight:800;color:${color}">${score}</span>
              <span style="font-size:10px;color:${color}">/${quiz.preguntas.length}</span>
            </div>
            <div>
              <div style="font-size:16px;font-weight:700">${msg}</div>
              <div style="font-size:13px;color:var(--text-muted)">${pct}% de respuestas correctas</div>
            </div>
            <button class="btn btn-outline" style="margin-left:auto" onclick="quizReintentar()">Reintentar</button>
          </div>
        `;
      }
    }

    function quizReintentar() {
      quizAnswers   = {};
      quizSubmitted = false;
      const m = DATA.materias.find(m => m.id === activeMateriaId);
      renderQuizContent(m);
    }

    // ============================================================
    // INFOGRAFÍAS
    // ============================================================
    function renderInfografias(m) {
      const infografias = m.infografias || [];
      const panel = document.getElementById('estudio-panel');

      if (!infografias.length) {
        panel.innerHTML = emptyState('🗂', 'Sin infografías', `Agregá infografías a "${m.abrev}" en data.js`);
        return;
      }

      panel.innerHTML = `
        <div style="margin-bottom:16px;font-size:15px;font-weight:700">${m.abrev} — Infografías</div>
        <div class="infografias-grid">
          ${infografias.map(inf => `
            <div class="infografia-card" style="--accent-color:${m.color}">
              <div class="infografia-header" style="border-top:3px solid ${m.color}">
                <div class="infografia-titulo">${inf.titulo}</div>
                <div class="infografia-desc">${inf.descripcion || ''}</div>
              </div>
              <div class="infografia-body">
                ${(inf.secciones || []).map(sec => `
                  <div>
                    <div class="infografia-seccion-titulo" style="color:${m.color}">${sec.titulo}</div>
                    <ul class="infografia-items">
                      ${(sec.items || []).map(it => `<li>${it}</li>`).join('')}
                    </ul>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // ── Util ─────────────────────────────────────────────────
    function emptyState(icon, title, text) {
      return `<div class="empty-state">
        <div class="empty-state-icon">${icon}</div>
        <div class="empty-state-title">${title}</div>
        <div class="empty-state-text">${text}</div>
      </div>`;
    }

    // ── Init ─────────────────────────────────────────────────
    if (urlParam && DATA.materias.find(m => m.id === urlParam)) {
      setMateria(urlParam);
    }
  </script>
</body>
</html>
