<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstudioFING — Acceso</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .login-logo-icon {
      width: 44px; height: 44px;
      background: #1e40af;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; color: #fff;
    }

    .login-logo-text { font-size: 20px; font-weight: 800; color: #0f172a; }
    .login-logo-sub  { font-size: 12px; color: #64748b; }

    .login-title {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }

    .login-field {
      margin-bottom: 16px;
    }

    .login-label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .login-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #0f172a;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }

    .login-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    .login-input.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,.12);
    }

    .login-error {
      display: none;
      font-size: 12.5px;
      color: #dc2626;
      margin-top: 8px;
      font-weight: 500;
    }

    .login-error.visible { display: block; }

    .login-btn {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
    }

    .login-btn:hover   { background: #1d4ed8; }
    .login-btn:active  { background: #1e40af; }
    .login-btn:disabled { background: #93c5fd; cursor: default; }

    .login-footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #f1f5f9;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">F</div>
      <div>
        <div class="login-logo-text">EstudioFING</div>
        <div class="login-logo-sub">FING · UdelaR</div>
      </div>
    </div>

    <div class="login-title">Acceso privado</div>
    <div class="login-sub">Ingresá tu contraseña para continuar.</div>

    <form id="login-form">
      <div class="login-field">
        <label class="login-label" for="password">Contraseña</label>
        <input type="password" id="password" class="login-input"
               placeholder="••••••••" autocomplete="current-password">
        <div class="login-error" id="login-error">Contraseña incorrecta. Intentá de nuevo.</div>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Entrar</button>
    </form>

    <div class="login-footer">FING UdelaR · App de estudio personal</div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    // Si ya está autenticado, ir directo al dashboard
    if (sessionStorage.getItem('estudio_auth') === PASS_HASH) {
      window.location.replace('index.html');
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn   = document.getElementById('login-btn');
      const input = document.getElementById('password');
      const err   = document.getElementById('login-error');

      btn.disabled    = true;
      btn.textContent = 'Verificando...';
      input.classList.remove('error');
      err.classList.remove('visible');

      const ok = await doLogin(input.value);

      if (!ok) {
        input.classList.add('error');
        err.classList.add('visible');
        btn.disabled    = false;
        btn.textContent = 'Entrar';
        input.value     = '';
        input.focus();
      }
    });
  </script>
</body>
</html>
