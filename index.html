<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstudioFING — Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>checkAuth();</script>
  <script src="notifications.js"></script>
</head>
<body>
  <nav id="sidebar"></nav>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="topbar-sub">Ingeniería en Computación · FING UdelaR</div>
      </div>
      <div class="topbar-right">
        <span class="date-badge" id="current-date"></span>
      </div>
    </header>

    <div class="content">
      <!-- Notificaciones del campus -->
      <div id="notif-panel"></div>

      <!-- Stats globales -->
      <div class="stats-row" id="stats-row"></div>

      <!-- Tarjetas por materia -->
      <div class="section-title">Mis Materias</div>
      <div class="dashboard-grid" id="dashboard-grid"></div>
    </div>
  </main>

  <script>
    renderSidebar('dashboard');

    // Panel de notificaciones del campus
    (function() {
      const notifs = typeof NOTIFICATIONS !== 'undefined' ? NOTIFICATIONS : [];
      const panel  = document.getElementById('notif-panel');
      if (!notifs.length) return;

      const colores = {
        danger:  { bg: '#fef2f2', border: '#fca5a5', text: '#991b1b', dot: '#ef4444' },
        warning: { bg: '#fffbeb', border: '#fde68a', text: '#92400e', dot: '#f59e0b' },
        info:    { bg: '#eff6ff', border: '#93c5fd', text: '#1e40af', dot: '#3b82f6' },
        success: { bg: '#f0fdf4', border: '#86efac', text: '#166534', dot: '#22c55e' },
      };

      const danger  = notifs.filter(n => n.tipo === 'danger').length;
      const warning = notifs.filter(n => n.tipo === 'warning').length;

      panel.innerHTML = `
        <div style="margin-bottom:20px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:15px;font-weight:700">
              Notificaciones del Campus
              ${danger ? `<span style="background:#ef4444;color:#fff;font-size:11px;padding:2px 8px;border-radius:99px;margin-left:8px">${danger} urgente${danger>1?'s':''}</span>` : ''}
            </div>
            <span style="font-size:11px;color:var(--text-muted)">
              ${typeof NOTIFICATIONS_UPDATED !== 'undefined' && NOTIFICATIONS_UPDATED
                ? 'Actualizado: ' + NOTIFICATIONS_UPDATED
                : 'Ejecutá sync_campus.py para actualizar'}
            </span>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${notifs.map(n => {
              const c = colores[n.tipo] || colores.info;
              return `
                <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;
                            background:${c.bg};border:1px solid ${c.border};border-radius:8px">
                  <div style="width:8px;height:8px;border-radius:50%;background:${c.dot};
                              margin-top:5px;flex-shrink:0"></div>
                  <div style="flex:1;min-width:0">
                    <div style="font-size:13px;font-weight:600;color:${c.text}">${n.titulo}</div>
                    <div style="font-size:12px;color:${c.text};opacity:.8;margin-top:2px">${n.mensaje}</div>
                  </div>
                  <span style="font-size:11px;font-weight:600;color:${c.text};opacity:.7;
                               white-space:nowrap;flex-shrink:0">${n.materia}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    })();

    // Fecha
    document.getElementById('current-date').textContent =
      new Date().toLocaleDateString('es-UY', { weekday:'long', day:'numeric', month:'long', year:'numeric' })
        .replace(/^./, c => c.toUpperCase());

    // Stats globales
    const totalTextos    = getTextosTotales();
    const totalResumidos = getResumidosTotales();
    const totalResumenes = getResumenesTotales();
    const totalBiblio    = DATA.materias.reduce((s,m) => s + (m.bibliografia||[]).length, 0);

    document.getElementById('stats-row').innerHTML = [
      { value: DATA.materias.length, label: 'Materias',     color: '#2563eb' },
      { value: totalTextos,          label: 'Textos totales', color: '#7c3aed' },
      { value: totalResumidos,       label: 'Resumidos',     color: '#059669' },
      { value: totalBiblio,          label: 'Bibliografía',  color: '#d97706' },
    ].map(s => `
      <div class="stat-card">
        <div class="stat-card-value" style="color:${s.color}">${s.value}</div>
        <div class="stat-card-label">${s.label}</div>
      </div>
    `).join('');

    // Tarjetas de materias
    const grid = document.getElementById('dashboard-grid');
    grid.innerHTML = DATA.materias.map(m => {
      const textos   = m.textos || [];
      const resumidos = textos.filter(t => t.resumido).length;
      const pct = textos.length ? Math.round(resumidos / textos.length * 100) : 0;
      const resumenes = (m.resumenes || []).length;

      return `
        <div class="materia-card">
          <div class="materia-card-top">
            <div class="materia-icon" style="background:${m.colorLight};color:${m.color}">${m.icono}</div>
            <div class="materia-info">
              <div class="materia-nombre">${m.nombre}</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${m.abrev}</div>
            </div>
          </div>

          <div style="padding:12px 20px;display:flex;gap:20px;border-bottom:1px solid var(--border)">
            <div class="stat-item">
              <div class="stat-value" style="color:${m.color}">${textos.length}</div>
              <div class="stat-label">textos</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" style="color:${m.color}">${resumidos}</div>
              <div class="stat-label">resumidos</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" style="color:${m.color}">${resumenes}</div>
              <div class="stat-label">resúmenes</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" style="color:${m.color}">${(m.flashcards||[]).length}</div>
              <div class="stat-label">flashcards</div>
            </div>
          </div>

          <div class="materia-progress">
            <div class="progress-info">
              <span>Progreso de resúmenes</span>
              <span style="font-weight:600;color:${m.color}">${pct}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%;background:${m.color}"></div>
            </div>
          </div>

          <div class="materia-actions">
            <a href="${m.links.campus}" target="_blank" class="btn btn-outline btn-sm">
              🏫 Campus
            </a>
            <a href="${m.links.clases}" target="_blank" class="btn btn-outline btn-sm">
              🎬 Clases
            </a>
            <a href="resumenes.html?materia=${m.id}" class="btn btn-sm" style="background:${m.colorLight};color:${m.color};border-color:${m.color}30">
              📝 Resúmenes
            </a>
            <a href="cuaderno.html?materia=${m.id}" class="btn btn-sm" style="background:${m.colorLight};color:${m.color};border-color:${m.color}30">
              📓 Cuaderno
            </a>
            <a href="estudio.html?materia=${m.id}" class="btn btn-sm" style="background:${m.colorLight};color:${m.color};border-color:${m.color}30">
              🧠 Estudiar
            </a>
          </div>
        </div>
      `;
    }).join('');
  </script>
</body>
</html>
